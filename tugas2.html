<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas 2 - Kalkulator Sederhana</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.kalkulator{
    width:360px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 15px 30px rgba(0,0,0,0.1);
    border:2px solid #3f6db5;
}

.kalkulator h2{
    text-align:center;
    margin-bottom:20px;
    color:#3f6db5;
}

input, select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    background:#3f6db5;
    color:white;
    border:none;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#2f5597;
}

.hasil{
    margin-top:20px;
    padding:12px;
    background:#eef3ff;
    border-radius:6px;
    text-align:center;
    font-weight:bold;
    color:#333;
}
</style>
</head>

<body>

<div class="kalkulator">
    <h2>Kalkulator Sederhana</h2>

    <input type="number" id="angka1" placeholder="Masukkan Angka Pertama">

    <select id="operator">
        <option value="+">Tambah (+)</option>
        <option value="-">Kurang (-)</option>
        <option value="*">Kali (×)</option>
        <option value="/">Bagi (÷)</option>
    </select>

    <input type="number" id="angka2" placeholder="Masukkan Angka Kedua">

    <button onclick="hitung()">HITUNG SEKARANG</button>

    <div class="hasil" id="hasil">Hasil akan muncul di sini</div>
</div>

<script>
function hitung(){
    let a = parseFloat(document.getElementById("angka1").value);
    let b = parseFloat(document.getElementById("angka2").value);
    let op = document.getElementById("operator").value;
    let hasil;

    if(isNaN(a) || isNaN(b)){
        hasil = "Masukkan kedua angka dengan benar!";
    } else {
        if(op === "+") hasil = a + b;
        if(op === "-") hasil = a - b;
        if(op === "*") hasil = a * b;
        if(op === "/") hasil = b !== 0 ? a / b : "Tidak bisa dibagi 0";
    }

    document.getElementById("hasil").innerHTML = "Hasil: " + hasil;
}
</script>

</body>
</html>
