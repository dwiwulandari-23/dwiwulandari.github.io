<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Pustaka Arunika</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#f5f7fb,#eef3ff);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.login-box{
width:100%;
max-width:430px;
background:white;
padding:35px;
border-radius:22px;
box-shadow:0 20px 45px rgba(0,0,0,0.12);
text-align:center;
}

.login-box h1{
color:#1a2a44;
margin-bottom:10px;
}

.login-box p{
color:#666;
font-size:14px;
margin-bottom:25px;
line-height:1.8;
}

.input-group{
margin-bottom:16px;
text-align:left;
}

.input-group label{
display:block;
margin-bottom:7px;
font-size:14px;
font-weight:600;
color:#1a2a44;
}

.input-group input{
width:100%;
padding:14px 16px;
border:1px solid #dfe5f1;
border-radius:14px;
outline:none;
font-size:14px;
background:#f9fbff;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff9f43,#ff7f00);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.extra{
margin-top:18px;
font-size:14px;
color:#666;
}

.extra a{
color:#ff7f00;
text-decoration:none;
font-weight:600;
}
</style>
</head>
<body>

<div class="login-box">
<h1>Login Anggota</h1>
<p>Masuk ke akun Pustaka Arunika untuk mengakses layanan perpustakaan.</p>

<!-- PANEL SUKSES LOGIN (tersembunyi dulu) -->
<div id="suksesLogin" style="
display:none;
background:#e8fff1;
border:1px solid #b7f5ce;
padding:18px;
border-radius:14px;
margin-bottom:20px;
text-align:center;
">
<h3 style="color:#1a7f4b;margin-bottom:8px;">🎉 Login Berhasil!</h3>
<p style="font-size:14px;color:#2e5f45;">
Selamat datang kembali di Pustaka Arunika. Anda akan diarahkan ke beranda.
</p>
</div>

<form onsubmit="loginAnggota(event)">

<div class="input-group">
<label>Email / Username</label>
<input type="text" id="email" placeholder="Masukkan email atau username">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Masukkan password">
</div>

<button type="submit" class="btn">Login</button>
</form>

<div id="pesan" style="margin-top:15px;font-weight:600;text-align:center;"></div>

<div class="extra">
Belum punya akun? <a href="daftar.html">Daftar sekarang</a>
</div>
</div>

<script>
function loginAnggota(e){
    e.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let pesan = document.getElementById("pesan");

    let data = localStorage.getItem(email);

    if(!data){
        pesan.innerHTML = "Akun belum terdaftar!";
        pesan.style.color = "red";
        return;
    }

    let anggota = JSON.parse(data);

    if(password === anggota.password){
        localStorage.setItem("loginAktif", email);

        document.getElementById("suksesLogin").style.display = "block";
        pesan.innerHTML = "";

        setTimeout(()=>{
            window.location.href = "index.html";
        },2000);

    }else{
        pesan.innerHTML = "Password salah!";
        pesan.style.color = "red";
    }
}
</script>
</body>
</html>
